<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="გერმანული ზმნების ვარჯიში ქართველი მოსწავლეებისთვის">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DeutschDE">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>DeutschDE — გერმანული ზმნები</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="install-banner" class="install-banner hidden">
  <span>📱 ტელეფონზე დაინსტალირება</span>
  <button id="install-btn">დაინსტალირება</button>
  <button id="install-dismiss">✕</button>
</div>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-de">DE</span>
      <span class="logo-sep">×</span>
      <span class="logo-ka">KA</span>
    </div>
    <div class="header-info">
      <div class="verb-family-label">ზმნათა ოჯახი</div>
      <div class="verb-family-name">geben</div>
    </div>
    <div class="progress-ring-wrap">
      <svg class="progress-ring" width="48" height="48">
        <circle class="ring-bg" cx="24" cy="24" r="20"/>
        <circle class="ring-fill" id="ring-fill" cx="24" cy="24" r="20"/>
      </svg>
      <span class="ring-pct" id="ring-pct">0%</span>
    </div>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="flashcard">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    ბარათები
  </button>
  <button class="tab-btn" data-tab="quiz">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    ვიქტორინა
  </button>
  <button class="tab-btn" data-tab="list">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    სია
  </button>
</nav>

<div class="family-filter-bar">
  <button class="family-btn active" data-family="">ყველა</button>
  <button class="family-btn" data-family="geben">geben</button>
  <button class="family-btn" data-family="gehen">gehen</button>
</div>

<main class="main-content">

  <!-- FLASHCARD TAB -->
  <section id="tab-flashcard" class="tab-section active">
    <div class="fc-stats-row">
      <div class="stat-chip"><span class="stat-n" id="fc-seen">0</span><span class="stat-l">ნანახი</span></div>
      <div class="stat-chip accent"><span class="stat-n" id="fc-known">0</span><span class="stat-l">ვიცი</span></div>
      <div class="stat-chip"><span class="stat-n">20</span><span class="stat-l">სულ</span></div>
    </div>

    <div class="fc-dots" id="fc-dots"></div>

    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard">
        <div class="fc-front">
          <div class="fc-verb" id="fc-verb">geben</div>
          <div class="fc-meta" id="fc-meta">gibt · gab · hat gegeben</div>
          <div class="fc-divider"></div>
          <div class="fc-example-de" id="fc-example-de"></div>
          <div class="fc-tap-hint">შეეხე — თარგმანის სანახავად</div>
        </div>
        <div class="fc-back">
          <div class="fc-meaning" id="fc-meaning"></div>
          <div class="fc-divider"></div>
          <div class="fc-example-de-b" id="fc-example-de-b"></div>
          <div class="fc-example-ka" id="fc-example-ka"></div>
        </div>
      </div>
    </div>

    <div class="fc-actions" id="fc-actions-hidden">
      <button class="action-btn know" id="btn-know">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        ვიცი
      </button>
      <button class="action-btn skip" id="btn-next-fc">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        შემდეგი
      </button>
    </div>
  </section>

  <!-- QUIZ TAB -->
  <section id="tab-quiz" class="tab-section">
    <div class="quiz-score-row">
      <div class="score-box correct-box"><div class="score-n" id="q-correct">0</div><div class="score-l">სწორი</div></div>
      <div class="score-box wrong-box"><div class="score-n" id="q-wrong">0</div><div class="score-l">მცდარი</div></div>
      <div class="score-box pct-box"><div class="score-n" id="q-pct">—</div><div class="score-l">%</div></div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress-fill"></div></div>

    <div class="quiz-card">
      <div class="quiz-direction" id="quiz-direction">გერმანული → ქართული</div>
      <div class="quiz-question" id="quiz-question"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-explanation hidden" id="quiz-explanation"></div>
    </div>

    <div class="quiz-next-wrap">
      <button class="next-btn hidden" id="quiz-next-btn">შემდეგი კითხვა →</button>
    </div>
  </section>

  <!-- LIST TAB -->
  <section id="tab-list" class="tab-section">
    <div class="list-search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="list-search" placeholder="ზმნის ძიება..." class="list-search">
    </div>
    <div class="verb-list" id="verb-list"></div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
